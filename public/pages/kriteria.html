<div class=" mx-auto space-y-8">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-100">Pengaturan Kriteria</h1>
            <p class="text-slate-400 mt-1">Atur bobot, deskripsi, dan tambah kriteria penilaian SAW secara dinamis.</p>
        </div>
        <button onclick="window.openModal('modal-kriteria')" class="flex items-center space-x-1.5 bg-indigo-500/20 border border-indigo-500/30 hover:bg-indigo-500/30 text-indigo-300 px-4 py-2 rounded-lg text-xs font-bold shadow-sm transition-all group">
            <i class="ph-bold ph-plus text-base group-hover:scale-110 transition-transform"></i>
            <span>Tambah Kriteria</span>
        </button>
    </div>

    <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-900/50 text-xs font-bold text-slate-400 uppercase border-b border-slate-700">
                <tr>
                    <th class="px-6 py-4">Kode</th>
                    <th class="px-6 py-4">Nama Kriteria</th>
                    <th class="px-6 py-4 w-1/3">Deskripsi <span class="text-[10px] lowercase text-slate-500 font-normal">(baru)</span></th>
                    <th class="px-6 py-4 text-center">Tipe</th>
                    <th class="px-6 py-4 text-center">Bobot (0-1)</th>
                    <th class="px-6 py-4 text-center">Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-kriteria" class="divide-y divide-slate-700 text-slate-300 text-sm">
                </tbody>
        </table>
        <div class="p-6 bg-slate-900/50 border-t border-slate-700 flex justify-between items-center">
            <p class="text-sm text-slate-500 italic"><i class="ph-fill ph-info mr-1"></i> Total bobot seluruh kriteria wajib berjumlah 1.00</p>
    
            <button onclick="saveBobot()" class="bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-400 border border-emerald-500/30 px-4 py-2 rounded-lg text-xs font-bold shadow-sm transition-all">
                Update Semua Kriteria
            </button>
        </div>
    </div>
</div>

<div id="modal-kriteria" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm items-center justify-center z-50 hidden">
    <div class="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-700">
        <div class="bg-slate-900/50 px-6 py-4 border-b border-slate-700 flex justify-between items-center">
            <h2 id="modal-kri-title" class="text-xl font-bold text-slate-100">Form Kriteria</h2>
            <button onclick="window.closeModal('modal-kriteria')" class="text-slate-400 hover:text-red-400 text-2xl transition"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-1">Kode</label>
                    <input type="text" id="kri-kode" placeholder="Misal: C5" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-300 mb-1">Bobot Awal</label>
                    <input type="number" step="0.01" id="kri-bobot" placeholder="0.10" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">Nama Kriteria</label>
                <input type="text" id="kri-nama" placeholder="Misal: Kedisiplinan" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">Tipe</label>
                <select id="kri-tipe" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="benefit">Benefit (Makin tinggi makin bagus)</option>
                    <option value="cost">Cost (Makin rendah makin bagus)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">Deskripsi (Opsional)</label>
                <textarea id="kri-deskripsi" rows="2" placeholder="Jelaskan apa yang dinilai..." class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
            </div>
        </div>
        <div class="bg-slate-900/50 px-6 py-4 border-t border-slate-700 flex justify-end space-x-3">
            <button onclick="window.closeModal('modal-kriteria')" class="px-5 py-2.5 text-slate-300 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition">Batal</button>
            <button onclick="window.saveNewKriteria()" class="px-5 py-2.5 bg-indigo-500/20 hover:bg-indigo-500/30 border border-indigo-500/30 text-indigo-300 rounded-xl font-bold transition">Simpan Kriteria</button>
        </div>
    </div>
</div>
