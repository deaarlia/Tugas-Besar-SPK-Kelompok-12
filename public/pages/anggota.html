<div class="space-y-8 w-full">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-100 tracking-tight">Manajemen Anggota</h1>
            <p class="text-slate-400 mt-1 text-sm">Pusat manajemen data anggota dan persetujuan jadwal operasional piket.</p>
        </div>
        <button onclick="openModalTambah()" class="flex items-center space-x-1.5 bg-indigo-500/20 border border-indigo-500/30 hover:bg-indigo-500/30 text-indigo-300 px-4 py-2 rounded-lg text-xs font-bold shadow-sm transition-all group">
            <i class="ph-bold ph-plus text-base group-hover:scale-110 transition-transform"></i>
            <span>Tambah Anggota</span>
        </button>
    </div>

    <div id="tabel-anggota"></div>
</div>

<div id="modal-tambah" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm items-center justify-center z-50 hidden transition-opacity">
    <div class="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-700">
        <div class="bg-slate-900/50 px-6 py-4 border-b border-slate-700 flex justify-between items-center">
            <h2 class="text-xl font-bold text-slate-100">Tambah Anggota</h2>
            <button onclick="closeModal('modal-tambah')" class="text-slate-400 hover:text-red-400 text-2xl transition"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">Serial Number</label>
                <input type="text" id="inp-sn" placeholder="SN. AXX-0XX" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <p class="text-xs text-rose-400 mt-1">Format wajib: SN. AXX-0XX</p>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">NIM</label>
                <input type="text" id="inp-nim" placeholder="Masukkan NIM" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">Nama Lengkap</label>
                <input type="text" id="inp-nama" placeholder="Masukkan Nama" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">Jenis Kelamin</label>
                <select id="inp-jenis_kelamin" class="w-full border border-slate-600 bg-slate-900 text-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    <option value="L">Laki-laki</option>
                    <option value="P">Perempuan</option>
                </select>
            </div>
        </div>
        <div class="bg-slate-900/50 px-6 py-4 border-t border-slate-700 flex justify-end space-x-3">
            <button onclick="closeModal('modal-tambah')" class="px-5 py-2.5 text-slate-300 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition">Batal</button>
            <button onclick="saveAnggota()" class="px-5 py-2.5 bg-indigo-500/20 hover:bg-indigo-500/30 border border-indigo-500/30 text-indigo-300 rounded-xl font-bold transition">Simpan Anggota</button>
        </div>
    </div>
</div>

<div id="modal-jadwal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm items-center justify-center z-50 hidden transition-opacity">
    <div class="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[90vh] border border-slate-700">
        <div class="bg-slate-900/50 px-6 py-4 border-b border-slate-700 flex justify-between items-center text-slate-100">
            <h2 id="modal-jadwal-title" class="text-xl font-bold">Jadwal Mingguan</h2>
            <button onclick="closeModal('modal-jadwal')" class="text-slate-400 hover:text-red-400 text-2xl transition leading-none"><i class="ph-bold ph-x"></i></button>
        </div>
        
        <div class="bg-slate-900/30 p-4 border-b border-slate-700 flex space-x-2 overflow-x-auto" id="day-tabs">
            <button onclick="changeTab('senin')" class="tab-btn bg-slate-700 text-indigo-400 border border-slate-600 shadow-sm px-6 py-2 rounded-lg font-bold text-sm transition">Senin</button>
            <button onclick="changeTab('selasa')" class="tab-btn text-slate-400 hover:text-slate-200 hover:bg-slate-800 px-6 py-2 rounded-lg font-bold text-sm transition">Selasa</button>
            <button onclick="changeTab('rabu')" class="tab-btn text-slate-400 hover:text-slate-200 hover:bg-slate-800 px-6 py-2 rounded-lg font-bold text-sm transition">Rabu</button>
            <button onclick="changeTab('kamis')" class="tab-btn text-slate-400 hover:text-slate-200 hover:bg-slate-800 px-6 py-2 rounded-lg font-bold text-sm transition">Kamis</button>
            <button onclick="changeTab('jumat')" class="tab-btn text-slate-400 hover:text-slate-200 hover:bg-slate-800 px-6 py-2 rounded-lg font-bold text-sm transition">Jumat</button>
        </div>

        <div class="p-6 overflow-y-auto flex-1 bg-slate-800" id="tab-content-area">
            </div>

        <div class="bg-slate-900/50 px-6 py-4 border-t border-slate-700 flex justify-end space-x-3">
            <button onclick="closeModal('modal-jadwal')" class="px-5 py-2.5 text-slate-300 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition">Batal</button>
            <button onclick="saveJadwal()" class="px-5 py-2.5 bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-400 border border-emerald-500/30 rounded-xl font-bold transition">Simpan Jadwal</button>
        </div>
    </div>
</div>
