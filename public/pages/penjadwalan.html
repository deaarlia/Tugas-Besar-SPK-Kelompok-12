<div class="space-y-5 w-full">
    <div>
        
        <h1 class="text-3xl font-bold text-slate-100 tracking-tight">Sistem Perankingan SAW</h2>
            <p class="text-slate-400 mt-1 text-sm">Pilih hari dan shift untuk melihat rekomendasi anggota, lalu kelola jadwal di bawah.</p>
    </div>

    <div class="bg-slate-800 p-5 rounded-xl shadow-sm border border-slate-700 flex flex-col md:flex-row gap-4">
        <div class="flex-1">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Hari Piket</label>
            <select id="sel-hari" class="w-full bg-slate-900 border border-slate-600 text-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-indigo-500 transition cursor-pointer shadow-inner" onchange="runSAW()">
                <option value="senin">Senin</option>
                <option value="selasa">Selasa</option>
                <option value="rabu">Rabu</option>
                <option value="kamis">Kamis</option>
                <option value="jumat">Jumat</option>
            </select>
        </div>
        <div class="flex-1">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Sesi Shift</label>
            <select id="sel-shift" class="w-full bg-slate-900 border border-slate-600 text-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-indigo-500 transition cursor-pointer shadow-inner" onchange="runSAW()">
                <option value="1">Shift 1: (08:00 - 10:00)</option>
                <option value="2" selected>Shift 2: (10:00 - 12:00)</option>
                <option value="3">Shift 3: (12:00 - 14:00)</option>
                <option value="4">Shift 4: (14:00 - 16:00)</option>
            </select>
        </div>
    </div>

    <div id="result-saw" class="bg-slate-800 rounded-xl shadow-sm border border-slate-700 overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-700 bg-slate-900/50 flex items-center space-x-2.5">
            <i class="ph-fill ph-trophy text-indigo-400 text-xl"></i>
            <h3 class="font-bold text-slate-200 text-base">Hasil Rekomendasi</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left text-slate-300">
                <thead class="text-xs text-slate-400 uppercase bg-slate-900/50 border-b border-slate-700">
                    <tr>
                        <th class="px-5 py-3 font-bold">Rank</th>
                        <th class="px-5 py-3 font-bold">Nama Anggota</th>
                        <th class="px-5 py-3 font-bold text-center">Skor (V)</th>
                        <th class="px-5 py-3 font-bold text-center">Detail C1-C4</th>
                        <th class="px-5 py-3 font-bold text-center">Jeda</th>
                        <th class="px-5 py-3 font-bold text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabel-hasil-saw" class="divide-y divide-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="bg-slate-800 rounded-xl shadow-sm border border-slate-700 overflow-hidden mt-5">
        <div class="px-5 py-4 border-b border-slate-700 bg-slate-900/50 flex items-center justify-between">
            <div class="flex items-center space-x-2.5">
                <i class="ph-fill ph-calendar-edit text-emerald-400 text-xl"></i>
                <h3 class="font-bold text-slate-200 text-base">Editor Jadwal Aktif</h3>
            </div>
            <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 uppercase tracking-wider font-bold border border-slate-700">Klik ikon X untuk hapus</span>
        </div>
        <div class="overflow-x-auto">
            <div id="container-jadwal-admin" class="min-w-full inline-block align-middle">
                </div>
        </div>
    </div>
</div>
